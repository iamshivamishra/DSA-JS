   function InsertEl(){
    let data = [9,45,12,8,45,23];
    let newEl = Number(document.getElementById('newElement').value);
    let position = document.getElementById('positionInput').value;
    for(let i = data.length-1; i>=0; i--){
     if(i>=position){
       data[i+1] = data[i]; 
       if(i==position){
         data[i] = newEl;
       }
     } 
    }
    console.log(data); 
   }
  </script>
