  <input type="text" id="element" placeholder="Enter your name">

    let data = [9,45,12,8,45,23,7,78,11,41,77];
  
    // Array Traversing
    for(let i = 0; i < data.length; i++){

    }

    // Function
    function getElement(){
      let value = document.getElementById("element").value;
      value = parseInt(value);
      if(isNaN(value)){
        alert("Please enter a valid number not a string");
      } else if(value > data.length){
        alert("Please enter a number less than " + data.length)
      } else if(value < 0){

      }else{
        alert("Your number is " + data[value]);
