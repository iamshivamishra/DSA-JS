<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array shorting in javascript</title>
</head>
<body>
  
  <script>
   let data = [30,45,56,12, 89, 10];
    for(i=0; i<data.length; i++){
      for(j=0; j<data.length; j++){
        if(data[j]>data[j + 1]){
         let temmp = data[j]
         data[j] = data[j + 1]
         data[j + 1] = temmp
        }
      }
    }
    console.log(data);
  </script>
</body>
</html>
